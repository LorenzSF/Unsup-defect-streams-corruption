seed: 42
output_dir: C:/Users/Usuario/Desktop/Thesis/Pipeline/Real-time-visual-defect-detection/data/outputs
log_every: 50

stream:
  dataset: real_iad
  category: audiojack
  data_root: data/Real-IAD_dataset/realiad_1024
  extensions:
    - .jpg
    - .jpeg
  shuffle: true
  max_frames: null   # null = full stream

warmup:
  warmup_steps: 100
  use_clean_frames: true   # warm up before corruption is applied

model:
  name: pca                
  backbone: ''             
  device: cpu             
  checkpoint: null

corruption:
  enabled: false
  specs:
    - kind: jpeg_compression
      severity: 3
      probability: 1.0

metrics:
  window_size: 500
  threshold_mode: manual    # manual | f1_optimal
  manual_threshold: 0.5     # used only when threshold_mode == manual
  calibration_ok: 0         # only used when threshold_mode == f1_optimal (>0 required)
  calibration_ng: 0         # only used when threshold_mode == f1_optimal (>0 required)

visualization:
  mode: file        # window | file | none
  every_n_frames: 10
  overlay_alpha: 0.5
