seed: 42
output_dir: C:/Users/Usuario/Desktop/Thesis/Pipeline/Real-time-visual-defect-detection/data/outputs
log_every: 50

stream:
  dataset: real_iad
  category: audiojack
  data_root: data/Real-IAD_dataset/realiad_1024
  extensions:
    - .jpg
    - .jpeg
  shuffle: true
  max_frames: null   # null = full stream

warmup:
  warmup_steps: 500        # >= 500 recommended for threshold_mode == pot (needs ~10 tail samples)
  use_clean_frames: true   # warm up before corruption is applied

model:
  name: pca                
  backbone: ''             
  device: cpu             
  checkpoint: null

corruption:
  enabled: false
  specs:
    - kind: jpeg_compression
      severity: 3
      probability: 1.0

metrics:
  window_size: 500
  threshold_mode: pot       # manual | pot
  manual_threshold: 0.5     # used only when threshold_mode == manual
  pot_risk: 1.0e-3          # target false-positive rate for POT (Siffer et al. 2017)

visualization:
  mode: file        # window | file | none
  every_n_frames: 10
  overlay_alpha: 0.5
  dashboard_enabled: true             # serve a live dashboard while main.py runs
  dashboard_host: 127.0.0.1           # bind address; 0.0.0.0 to expose on LAN
  dashboard_port: 8765                # http port for the dashboard
  dashboard_max_live_points: 200      # ring-buffer size for live embedding points
