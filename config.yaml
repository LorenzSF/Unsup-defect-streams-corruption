seed: 42
output_dir: C:/Users/Usuario/Desktop/Thesis/Pipeline/Real-time-visual-defect-detection/data/outputs
log_every: 50

stream:
  dataset: real_iad
  category: audiojack
  data_root: data/Real-IAD_dataset/realiad_1024
  extensions:
    - .jpg
    - .jpeg
  shuffle: true
  max_frames: null   # null = full stream

warmup:
  warmup_steps: 200
  use_clean_frames: true   # warm up before corruption is applied

model:
  name: pca                
  backbone: ''             
  device: cpu             
  checkpoint: null

corruption:
  enabled: true
  specs:
    - kind: jpeg_compression
      severity: 3
      probability: 1.0

metrics:
  window_size: 500
  threshold_mode: manual    # manual | quantile
  manual_threshold: 0.5     # used only when threshold_mode == manual
  threshold_quantile: 1.0   # used only when threshold_mode == quantile (1.0 = max OK score)

visualization:
  mode: file        # window | file | none
  every_n_frames: 10
  overlay_alpha: 0.5

benchmark:
  enabled: true
  baseline: online_autoencoder
  learning_rate: 1.0e-4
