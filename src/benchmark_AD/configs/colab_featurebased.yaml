# Job A — feature-based preview on Colab (PatchCore + PaDiM + SubspaceAD).
#
# Runs one Real-IAD category at a time, camera C1 only, to fit Colab Pro
# session limits. The bash driver in scripts/run_jobA_colab.sh loops over
# all 30 categories and passes each via --dataset-path. The three models
# below are feature-based (no training epochs) so results are representative
# with the default epoch=1 trained-model configs intentionally omitted.
#
# Threshold mode is val_f1 (current project default — see METHOD.md §2).
# The patched splitter in data.py routes 10% of anomalies into val so the
# F1 calibrator has both classes. The earlier val_defect overlay
# (colab_featurebased_val_defect.yaml) is now functionally equivalent to
# this file; kept around only so the prior runs are reproducible byte-for-byte.

_extends: ../default.yaml

run:
  run_name: "jobA_colab"
  output_dir: "/content/work/runs"

runtime:
  device: "auto"
  precision: "fp32"
  num_workers: 2
  pin_memory: true
  cudnn_benchmark: true

dataset:
  source_type: "folder"
  format: "real_iad"
  # Overridden per-category by scripts/run_jobA_colab.sh via --dataset-path.
  path: "/content/work/current"
  extract_dir: "/content/work/current"
  cameras: "C1"

benchmark:
  save_umap: false
  models:
    - name: "anomalib_patchcore"
      threshold: 0.5
      thresholding:
        mode: "val_f1"
        target_fpr: 0.01
      anomalib:
        image_size: 512
        batch_size: 8
        pre_trained: true
        backbone: "wide_resnet50_2"
        layers: ["layer2", "layer3"]
        coreset_sampling_ratio: 0.1
        num_neighbors: 9
        n_features: null

    - name: "anomalib_padim"
      threshold: 0.5
      thresholding:
        mode: "val_f1"
        target_fpr: 0.01
      anomalib:
        image_size: 512
        batch_size: 16
        pre_trained: true
        backbone: "resnet18"
        layers: ["layer1", "layer2", "layer3"]

    - name: "subspacead"
      threshold: 0.5
      thresholding:
        mode: "val_f1"
        target_fpr: 0.01
      subspacead:
        model_ckpt: "facebook/dinov2-with-registers-large"
        image_size: 512
        batch_size: 4
        pca_ev: 0.99
        pca_dim: null
        img_score_agg: "mtop1p"
        layers: [-12, -13, -14, -15, -16, -17, -18]
