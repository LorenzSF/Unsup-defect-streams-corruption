# Job B — feature-based preview on Colab (PatchCore + PaDiM + SubspaceAD).
#
# Same three feature-based models and output contract as Job A, but pointed at
# the Deceuninck industrial dataset. Deceuninck is a single dataset (good/ +
# defects/<5 subfolders>/*.jpg, no JSON labels), so the bash driver runs the
# pipeline once instead of looping over categories. Format "auto" — the loader
# recognises `defects/` as the anomaly folder via _BAD_DIR_NAMES.
#
# Threshold mode is val_f1 (current project default — see METHOD.md §2).
# Pairs with the patched splitter in data.py that routes 10% of anomalies
# into val. The previous val_defect overlay
# (colab_featurebased_deceuninck_val_defect.yaml) is now functionally
# equivalent to this file; kept around for reproducibility of earlier runs.

_extends: ../default.yaml

run:
  run_name: "jobB_colab"
  output_dir: "/content/work/runs"

runtime:
  device: "auto"
  precision: "fp32"
  num_workers: 2
  pin_memory: true
  cudnn_benchmark: true

dataset:
  source_type: "folder"
  format: "auto"
  # Overridden by scripts/run_jobB_colab.sh via --dataset-path (local SSD copy).
  path: "/content/work/current"
  extract_dir: "/content/work/current"

benchmark:
  save_umap: false
  models:
    - name: "anomalib_patchcore"
      threshold: 0.5
      thresholding:
        mode: "val_f1"
        target_fpr: 0.01
      anomalib:
        image_size: 512
        batch_size: 8
        pre_trained: true
        backbone: "wide_resnet50_2"
        layers: ["layer2", "layer3"]
        coreset_sampling_ratio: 0.1
        num_neighbors: 9
        n_features: null

    - name: "anomalib_padim"
      threshold: 0.5
      thresholding:
        mode: "val_f1"
        target_fpr: 0.01
      anomalib:
        image_size: 512
        batch_size: 16
        pre_trained: true
        backbone: "resnet18"
        layers: ["layer1", "layer2", "layer3"]

    - name: "subspacead"
      threshold: 0.5
      thresholding:
        mode: "val_f1"
        target_fpr: 0.01
      subspacead:
        model_ckpt: "facebook/dinov2-with-registers-large"
        image_size: 512
        batch_size: 4
        pca_ev: 0.99
        pca_dim: null
        img_score_agg: "mtop1p"
        layers: [-12, -13, -14, -15, -16, -17, -18]
