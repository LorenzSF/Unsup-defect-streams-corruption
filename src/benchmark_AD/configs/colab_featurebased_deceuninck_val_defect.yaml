# Job B "val_defect" overlay — same 3 feature-based models as
# colab_featurebased_deceuninck.yaml, but with thresholding.mode = "val_f1"
# and the industrial-calibration split rules:
#   * val_balance: equal              → val ends up 50/50 good/bad so the
#                                       F1 curve is unbiased by Deceuninck's
#                                       91% bad-heavy test prevalence.
#   * val_bad_balance_by_type: true   → per defect_type (Black spots,
#                                       Cleaning felt, Degassing, Pigment
#                                       spill, Scratch in extrusion
#                                       direction) the val bad pool is
#                                       capped at ceil(min_class * (1 +
#                                       tolerance)). With min_class = 21
#                                       (Black spots) and tolerance 0.15,
#                                       cap ≈ 25 per type. Scratches no
#                                       longer monopolise calibration.
#   * val_balance_tolerance: 0.15     → ±15% wiggle room.

_extends: ../default.yaml

run:
  run_name: "jobB_val_defect"
  output_dir: "/content/work/runs"

runtime:
  device: "auto"
  precision: "fp32"
  num_workers: 2
  pin_memory: true
  cudnn_benchmark: true

dataset:
  source_type: "folder"
  format: "auto"
  # Overridden by scripts/run_jobB_val_defect_colab.sh via --dataset-path
  # (local SSD copy). The "auto" loader recognises defects/ via _BAD_DIR_NAMES
  # and uses each subfolder name as defect_type.
  path: "/content/work/current"
  extract_dir: "/content/work/current"
  split:
    val_balance: "equal"
    val_bad_balance_by_type: true
    val_balance_tolerance: 0.15

benchmark:
  save_umap: false
  models:
    - name: "anomalib_patchcore"
      threshold: 0.5
      thresholding:
        mode: "val_f1"
        target_fpr: 0.01
      anomalib:
        image_size: 256
        batch_size: 8
        pre_trained: true
        backbone: "wide_resnet50_2"
        layers: ["layer2", "layer3"]
        coreset_sampling_ratio: 0.1
        num_neighbors: 9
        n_features: null

    - name: "anomalib_padim"
      threshold: 0.5
      thresholding:
        mode: "val_f1"
        target_fpr: 0.01
      anomalib:
        image_size: 256
        batch_size: 16
        pre_trained: true
        backbone: "resnet18"
        layers: ["layer1", "layer2", "layer3"]

    - name: "subspacead"
      threshold: 0.5
      thresholding:
        mode: "val_f1"
        target_fpr: 0.01
      subspacead:
        model_ckpt: "facebook/dinov2-with-registers-large"
        image_size: 256
        batch_size: 4
        pca_ev: 0.99
        pca_dim: null
        img_score_agg: "mtop1p"
        layers: [-12, -13, -14, -15, -16, -17, -18]
