# Job A "val_defect" overlay — historical artifact.
#
# After the 19-cat val_defect rerun (2026-04-27, see
# data/outputs/jobA_val_defect_V1/_analysis/REPORT.md), val_f1 became the
# project default. colab_featurebased.yaml itself now uses val_f1, so this
# file is functionally equivalent to it. Kept so the earlier "val_defect"
# bash driver and timestamps stay reproducible byte-for-byte.

_extends: ../default.yaml

run:
  run_name: "jobA_val_defect"
  output_dir: "/content/work/runs"

runtime:
  device: "auto"
  precision: "fp32"
  num_workers: 2
  pin_memory: true
  cudnn_benchmark: true

dataset:
  source_type: "folder"
  format: "real_iad"
  # Overridden per-category by scripts/run_jobA_val_defect_colab.sh.
  path: "/content/work/current"
  extract_dir: "/content/work/current"
  cameras: "C1"

benchmark:
  save_umap: false
  models:
    - name: "anomalib_patchcore"
      threshold: 0.5
      thresholding:
        mode: "val_f1"
        target_fpr: 0.01
      anomalib:
        image_size: 512
        batch_size: 8
        pre_trained: true
        backbone: "wide_resnet50_2"
        layers: ["layer2", "layer3"]
        coreset_sampling_ratio: 0.1
        num_neighbors: 9
        n_features: null

    - name: "anomalib_padim"
      threshold: 0.5
      thresholding:
        mode: "val_f1"
        target_fpr: 0.01
      anomalib:
        image_size: 512
        batch_size: 16
        pre_trained: true
        backbone: "resnet18"
        layers: ["layer1", "layer2", "layer3"]

    - name: "subspacead"
      threshold: 0.5
      thresholding:
        mode: "val_f1"
        target_fpr: 0.01
      subspacead:
        model_ckpt: "facebook/dinov2-with-registers-large"
        image_size: 512
        batch_size: 4
        pca_ev: 0.99
        pca_dim: null
        img_score_agg: "mtop1p"
        layers: [-12, -13, -14, -15, -16, -17, -18]
