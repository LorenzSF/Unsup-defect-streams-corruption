run:
  seed: 42
  output_dir: "data/outputs"
  run_name: "baseline"

runtime:
  device: "auto"               # auto | cpu | cuda | cuda:0
  precision: "fp32"            # fp32 | fp16 | bf16 (model-dependent)
  num_workers: 0
  pin_memory: true
  cudnn_benchmark: true

dataset:
  source_type: "folder"
  path: "data/Deceuninck_dataset"
  extract_dir: "data/Deceuninck_dataset"
  image_glob: "**/*.png"

  # Dataset layout hint. "auto" uses the legacy good/bad + JSON detection;
  # "real_iad" reads OK/ + NG/<defect>/<S000X>/..._Cn_*.jpg (masks PNGs are
  # skipped, sample_id is set from S000X so splits stay leakage-free).
  format: "auto"

  # Real-IAD only. "all" keeps every camera view; pass a list or comma
  # string (e.g. [C1, C3] or "C1,C3") to restrict to specific angles.
  cameras: "all"

  split:
    max_good: null
    max_bad: null
    max_unlabeled: null
    bad_fraction: null
    test_ratio: 0.2
    val_ratio: 0.1
    stratify: true
    train_on_good_only: true
    seed: null

preprocessing:
  resize:
    enabled: true
    width: 256
    height: 256
  normalize:
    enabled: true
    mode: "0_1"

# Synthetic corruption applied to test-set images only (training/validation
# stay clean so threshold calibration is unaffected). Disabled by default;
# enable from a per-run overlay or via --corruption / --severity on the CLI.
corruption:
  enabled: false
  type: "gaussian_noise"        # see src/corruptions/corruption_registry.py
  severity: 3                   # 1..5

# Single-model mode
model:
  name: "anomalib_patchcore"
  threshold: 0.5
  thresholding:
    mode: "val_quantile"      # fixed | val_f1 | val_quantile
    target_fpr: 0.01

  rd4ad:
    image_size: 256
    batch_size: 16
    backbone: "wide_resnet50_2"
    layers: ["layer1", "layer2", "layer3"]
    epochs: 1
    learning_rate: 0.005
    anomaly_map_mode: "multiply"

  anomalib:
    image_size: 256
    batch_size: 8
    pre_trained: true
    backbone: "wide_resnet50_2"
    layers: ["layer2", "layer3"]
    coreset_sampling_ratio: 0.1
    num_neighbors: 9
    n_features: null

  stfpm:
    backbone: "resnet18"
    layers: ["layer1", "layer2", "layer3"]
    epochs: 1
    learning_rate: 0.4

  csflow:
    epochs: 1
    learning_rate: 0.0002
    cross_conv_hidden_channels: 1024
    n_coupling_blocks: 4
    clamp: 3

  draem:
    epochs: 1
    learning_rate: 0.0001
    beta: [0.2, 1.0]

  subspacead:
    model_ckpt: "facebook/dinov2-with-registers-large"
    image_size: 256
    batch_size: 4
    pca_ev: 0.99
    pca_dim: null
    img_score_agg: "mtop1p"
    layers: [-12, -13, -14, -15, -16, -17, -18]

benchmark:
  save_umap: true
  # When omitted (or empty) and --all-models is not passed, the single-model
  # block above is used. Populate this list to benchmark several models in one run.
  models: []

evaluation:
  metrics: ["precision", "recall", "f1", "accuracy", "auroc", "aupr"]
