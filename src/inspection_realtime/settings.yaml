run:
  output_dir: "data/inspection realtime"
  session_name: "inspection realtime"
  target_fps: 10.0
  latency_sla_ms: 100.0
  max_frames: 60

artifact:
  runs_root: "data/runs"
  run_dir: null
  model_name: "rd4ad"
  fit_policy: "auto"   # auto | historical_fit | skip_fit

input:
  root_dir: "data/raw/extracted"
  loop: false
  sequence_mode: "interleaved_labels"

preprocessing:
  resize:
    enabled: true
    width: 256
    height: 256
  normalize:
    enabled: true
    mode: "0_1"

object_change:
  embedding_size: 24
  distance_threshold: 0.12
  reference_bank_size: 24
  consecutive_different_frames: 3
  min_confidence: 0.15

calibration:
  min_frames: 20
  require_baseline: true

web:
  enabled: true
  host: "127.0.0.1"
  port: 8765
  refresh_ms: 1000
