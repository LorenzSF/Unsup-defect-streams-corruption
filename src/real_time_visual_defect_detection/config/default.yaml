run:
  seed: 42
  output_dir: "data/runs"
  run_name: "baseline"

runtime:
  device: "auto"               # auto | cpu | cuda | cuda:0
  precision: "fp32"            # fp32 | fp16 | bf16 (model-dependent)
  num_workers: 0
  pin_memory: true
  cudnn_benchmark: true

dataset:
  source_type: "folder"
  path: "data/raw/extracted"
  extract_dir: "data/raw/extracted"
  image_glob: "**/*.png"

  split:
    max_good: null
    max_bad: null
    max_unlabeled: null
    bad_fraction: null
    test_ratio: 0.2
    val_ratio: 0.1
    stratify: true
    train_on_good_only: true
    seed: null

preprocessing:
  resize:
    enabled: true
    width: 256
    height: 256
  normalize:
    enabled: true
    mode: "0_1"

corruption:
  enabled: false
  type: "gaussian_noise"      # gaussian_noise | gaussian_blur | resolution_reduction
  params:
    sigma: 10.0
    ksize: 5
    scale: 0.5

# Single-model mode (used when benchmark.models is omitted).
model:
  name: "dummy_distance"
  threshold: 0.5
  thresholding:
    mode: "fixed"             # fixed | val_f1 | val_quantile
    target_fpr: 0.01

  rd4ad:
    image_size: 256
    epochs: 1
    learning_rate: 0.005
    batch_size: 16
    checkpoint_path: "data/checkpoints/rd4ad.pth"

  anomalib:
    image_size: 256
    batch_size: 8
    pre_trained: false
    backbone: "wide_resnet50_2"
    layers: ["layer2", "layer3"]
    coreset_sampling_ratio: 0.1
    num_neighbors: 9
    n_features: null

  stfpm:
    backbone: "resnet18"
    layers: ["layer1", "layer2", "layer3"]
    epochs: 1
    learning_rate: 0.4

  csflow:
    epochs: 1
    learning_rate: 0.0002
    cross_conv_hidden_channels: 1024
    n_coupling_blocks: 4
    clamp: 3

  draem:
    epochs: 1
    learning_rate: 0.0001
    beta: [0.2, 1.0]

  subspacead:
    model_ckpt: "facebook/dinov2-with-registers-large"
    image_size: 256
    batch_size: 4
    pca_ev: 0.99
    pca_dim: null
    img_score_agg: "mtop1p"
    layers: [-12, -13, -14, -15, -16, -17, -18]

benchmark:
  save_umap: true
  models:
    - name: "dummy_distance"
      threshold: 0.5
    # - name: "rd4ad"
    #   threshold: 0.5
    #   rd4ad:
    #     epochs: 1
    # - name: "anomalib_patchcore"
    #   threshold: 0.5
    #   thresholding:
    #     mode: "val_quantile"
    #     target_fpr: 0.01
    #   anomalib:
    #     pre_trained: false
    # - name: "anomalib_padim"
    #   threshold: 0.5
    # - name: "anomalib_stfpm"
    #   threshold: 0.5
    # - name: "anomalib_csflow"
    #   threshold: 0.5
    # - name: "anomalib_draem"
    #   threshold: 0.5
    # - name: "subspacead"
    #   threshold: 0.5

evaluation:
  metrics: ["precision", "recall", "f1", "accuracy", "auroc", "aupr"]
